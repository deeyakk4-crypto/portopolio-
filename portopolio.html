<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Portfolio Profesional</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #d8b4f8, #f3e8ff);
}

h1 {
  text-align: center;
  padding: 20px;
  color: #5b2c6f;
}

/* FLOAT GLOBAL */
.profile, .card, button, input {
  transition: all 0.3s ease;
}

.profile:hover,
.card:hover,
button:hover,
input:hover {
  transform: translateY(-6px) scale(1.01);
  box-shadow: 0 15px 30px rgba(0,0,0,0.25);
}

.profile:active,
.card:active,
button:active,
input:active {
  transform: translateY(-3px) scale(0.98);
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* SEARCH */
#search {
  width: 100%;
  margin-bottom: 15px;
  font-size: 14px;
}

/* PROFILE (SUPER BESAR) */
.profile {
  display: flex;
  align-items: center;
  gap: 30px;
  background: white;
  padding: 40px;
  border-radius: 30px;
  margin-bottom: 30px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.25);

  position: relative;
  overflow: hidden;

  opacity: 0;
  transform: translateY(-30px);
  animation: slideDown 0.6s forwards;
}

/* WAVE */
.profile::before {
  content: "";
  position: absolute;
  bottom: -25px;
  left: 0;
  width: 200%;
  height: 80px;
  background: #f3e8ff;
  border-radius: 50%;
}

/* FOTO */
.profile img {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  object-fit: cover;
}

/* TEXT */
.profile h2 {
  margin: 0;
  font-size: 26px;
  color: #6c3483;
}

.profile p {
  margin: 8px 0;
  font-size: 16px;
  color: #555;
}

.profile small {
  font-size: 14px;
}

/* FORM */
input, button {
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #a569bd;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #8e44ad;
}

/* LIST */
.grid {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* CARD */
.card {
  display: flex;
  align-items: center;
  background: white;
  border-radius: 15px;
  padding: 10px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);

  opacity: 0;
  transform: translateY(40px);
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

/* IMAGE */
.card img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 10px;
}

/* CONTENT */
.card-body {
  margin-left: 15px;
  flex: 1;
}

.card-body h3 {
  margin: 0;
  color: #6c3483;
}

.card-body p {
  font-size: 13px;
  color: #555;
}

/* ACTION */
.actions {
  display: flex;
  margin-top: 8px;
}

.actions button {
  flex: 1;
  margin: 2px;
  background: #7d3c98;
}

/* ANIMATION */
@keyframes slideDown {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<h1>💜 Portfolio Radea</h1>

<div class="container">

  <input type="text" id="search" placeholder="Cari nama project...">

  <div class="profile">
    <img src="f5036524-01a4-4dc1-9174-f0b10213cbba.jpg">
    <div>
      <h2>Radea Putri Rahayu</h2>
      <p>Anak SMK Jurusan RPL | Pelajar SMKN 1 GETA</p>
      <small>Membuat website modern & interaktif</small>
    </div>
  </div>

  <input type="text" id="title" placeholder="Nama Project">
  <input type="text" id="desc" placeholder="Deskripsi">
  <input type="file" id="image" accept="image/*">
  <button onclick="addProject()">Tambah</button>

  <div class="grid" id="list"></div>

</div>

<script>
let projects = [];

function render(data = projects) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((p, index) => {
    list.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <div class="card-body">
          <h3>${p.title}</h3>
          <p>${p.desc}</p>
          <div class="actions">
            <button onclick="editProject(${index})">Edit</button>
            <button onclick="deleteProject(${index})">Hapus</button>
          </div>
        </div>
      </div>
    `;
  });

  animateScroll();
}

function addProject() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const imageInput = document.getElementById("image");

  if (!title || !desc || imageInput.files.length === 0) {
    alert("Lengkapi semua data!");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    projects.push({
      title,
      desc,
      image: e.target.result
    });
    render();
  };

  reader.readAsDataURL(imageInput.files[0]);

  document.getElementById("title").value = "";
  document.getElementById("desc").value = "";
  imageInput.value = "";
}

function deleteProject(index) {
  projects.splice(index, 1);
  render();
}

function editProject(index) {
  const newTitle = prompt("Edit nama:", projects[index].title);
  const newDesc = prompt("Edit deskripsi:", projects[index].desc);

  if (newTitle && newDesc) {
    projects[index].title = newTitle;
    projects[index].desc = newDesc;
    render();
  }
}

document.getElementById("search").addEventListener("input", function() {
  const keyword = this.value.toLowerCase();
  const filtered = projects.filter(p =>
    p.title.toLowerCase().includes(keyword)
  );
  render(filtered);
});

function animateScroll() {
  const cards = document.querySelectorAll(".card");

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("show");
      }
    });
  }, { threshold: 0.2 });

  cards.forEach(card => observer.observe(card));
}
</script>

</body>
</html>
